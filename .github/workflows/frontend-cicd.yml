name: Frontend CI/CD

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read current version
        run: |
          VERSION=$(cat frontend/version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "$NEW_VERSION" > frontend/version.txt

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          echo "Old Version: $VERSION"
          echo "New Version: $NEW_VERSION"

      - name: Build Docker image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t kdmodder/frontend:${NEW_VERSION} \
            .

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kdmodder/frontend:${{ env.NEW_VERSION }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table

      - name: Push Docker image
        run: |
          docker push kdmodder/frontend:${NEW_VERSION}

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add frontend/version.txt

          git commit -m "chore(frontend): bump version to ${NEW_VERSION}" || exit 0

          git push
