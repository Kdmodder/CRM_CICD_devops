name: Detect Changed Services

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect Changes
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed.txt
          cat changed.txt

      - name: Check Services
        run: |
          for service in \
            analytics-service \
            api-gateway \
            auth-service \
            customer-service \
            discovery-server \
            frontend \
            integration-service \
            marketing-service \
            notification-service \
            sales-service \
            support-service \
            workflow-service
          do
            if grep -q "^$service/" changed.txt; then
              echo "$service changed"
            fi
          done
