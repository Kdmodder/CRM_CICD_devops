apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service
  namespace: kd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: analytics-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
        - name: analytics-service
          image: kdmodder/analytics-service:1.0.0
          imagePullPolicy: Always

          ports:
            - containerPort: 8086

          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "512Mi"

          
