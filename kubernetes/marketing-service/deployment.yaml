apiVersion: apps/v1
kind: Deployment

metadata:
  name: marketing-service
  namespace: kd
  labels:
    app: marketing-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: marketing-service

  template:
    metadata:
      labels:
        app: marketing-service

    spec:
      containers:
        - name: marketing-service
          image: kdmodder/marketing-service:1.0.0
          imagePullPolicy: Always

          ports:
            - containerPort: 8084

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "250m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
