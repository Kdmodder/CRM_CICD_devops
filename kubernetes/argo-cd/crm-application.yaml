apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: crm-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Kdmodder/CRM_CICD_devops.git
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: kd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
