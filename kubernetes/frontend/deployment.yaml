apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: kd

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        version: v1
        app: frontend

    spec:
      containers:
        - name: frontend
          image: kdmodder/frontend:1.0.4
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
