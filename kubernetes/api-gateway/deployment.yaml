apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: kd
  labels:
    app: api-gateway

spec:
  replicas: 3

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
      - name: api-gateway
        image: kdmodder/api-gateway:1.0.0
        imagePullPolicy: Always

        ports:
        - containerPort: 8080
