apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: kd
  labels:
    app: auth-service

spec:
  replicas: 3

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service
        image: kdmodder/auth-service:1.0.0
        imagePullPolicy: Always

        ports:
        - containerPort: 8081
