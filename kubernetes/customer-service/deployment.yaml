apiVersion: apps/v1
kind: Deployment

metadata:
  name: customer-service
  namespace: kd
  labels:
    app: customer-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: customer-service

  template:
    metadata:
      labels:
        app: customer-service

    spec:
      containers:
        - name: customer-service
          image: kdmodder/customer-service:1.0.0
          imagePullPolicy: Always

          ports:
            - containerPort: 8082

          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

         